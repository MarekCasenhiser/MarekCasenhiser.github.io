
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <title>Cat Playing Cards</title>

</head>

<body>
  <style>
    #playing-cards {
            display:flex;
            padding:20px;
            white-space:normal;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px
            border-radius: 5px;
    }
    .card {
            justify-content:space-between;
            display:flex;
            width: 500px;
            height: 500px;
            border: 2px solid;
    }
    .left {
            align-self: flex-start;
    }
    .middle {
            display: flex;
            align-self: center;
            flex-direction: column;
    }
    .right{
            align-self: flex-end;
    }


  </style>
  <main id="playing-cards">
    <div class="card">
      <div class="left" style="color:  blue;">A♠ :3</div>
      <div class="middle">Persian Cat</div>
      <div class="right" style="color: #E34D7C;">A♠ :3</div>
    </div>
    <div class="card">
      <div class="left" style="color: blue;">K♥ :3</div>
      <div class="middle">Maine Coon</div>
      <div class="right" style="color: #E34D7C;">K♥ :3</div>
    </div>
    <div class="card">
      <div class="left" style="color: blue;">Q♦ :3</div>
      <div class="middle">Siamese</div>
      <div class="right" style="color: #E34D7C;">Q♦ :3</div>
    </div>
  </main>

</body>

</html>
