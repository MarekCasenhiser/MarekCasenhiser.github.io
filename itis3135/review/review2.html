<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Capuyan, Jacob</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    h2 { font-size: 1.2rem; }
    ol { padding-left: 1.5rem; }
    li { line-height: 1.7; margin-bottom: 0.4rem; }
    ol ol { list-style-type: lower-alpha; }
    ol ol ol { list-style-type: lower-roman; }
    label { display: flex; align-items: flex-start; gap: 8px; }
    input[type="checkbox"] { margin-top: 4px; flex-shrink: 0; }
  </style>
</head>
<body>
  <h2>A checklist for each page (from the top)</h2>
  <ol>
    <li><label><input type="checkbox"><span>Your submission leads right to the page to be reviewed (or if instructed the primary page with links to the page, or both)</span></label></li>
    <li><label><input type="checkbox"><span>There are no spaces or upper-cases in the file/folder names, including scripts, images, etc.</span></label></li>
    <li><label><input type="checkbox"><span>Design</span></label>
      <ol>
        <li><label><input type="checkbox"><span>Page has sufficient contrast/font sizing so as to be easy to read</span></label></li>
        <li><label><input type="checkbox"><span>Page has site colors and fonts using the standard .css file, unless this assignment requires a unique/standalone/embedded one</span></label></li>
        <li><label><input type="checkbox"><span>CRAP</span></label>
          <ol>
            <li><label><input type="checkbox"><span>Contrast</span></label></li>
            <li><label><input type="checkbox"><span>Repetition</span></label></li>
            <li><label><input type="checkbox"><span>Alignment</span></label></li>
            <li><label><input type="checkbox"><span>Proximity</span></label></li>
          </ol>
        </li>
      </ol>
    </li>
    <li><label><input type="checkbox"><span>Page has within it:</span></label>
      <ol>
        <li><label><input type="checkbox"><span>Header</span></label></li>
        <li><label><input type="checkbox"><span>Main</span></label></li>
        <li><label><input type="checkbox"><span>Footer</span></label></li>
        <li><label><input type="checkbox"><span>(optional) nav for main menu between header and main</span></label></li>
      </ol>
    </li>
    <li><label><input type="checkbox"><span>Header has site/brand header with text in an h1</span></label>
      <ol>
        <li><label><input type="checkbox"><span>If this is a homework page it's likely something like Student Name * Course ID Course Name</span></label></li>
        <li><label><input type="checkbox"><span>If this is a "branded page" it should be the brand/company</span></label></li>
        <li><label><input type="checkbox"><span>DO NOT INCLUDE THE PAGE NAME IN THE HEADER</span></label></li>
        <li><label><input type="checkbox"><span>Understand the difference between head, header, and heading</span></label></li>
      </ol>
    </li>
    <li><label><input type="checkbox"><span>Main starts with name of page as an h2 and does not include name of site/brand</span></label></li>
    <li><label><input type="checkbox"><span>Page has brand tagline somewhere (make up a slogan and include it on every page in a consistent location)</span></label></li>
    <li><label><input type="checkbox"><span>Page has footer with</span></label>
      <ol>
        <li><label><input type="checkbox"><span>Menu for user's pages</span></label></li>
        <li><label><input type="checkbox"><span>Page has html validation button/link and validates</span></label></li>
        <li><label><input type="checkbox"><span>Page has css validation button/link and validates</span></label></li>
      </ol>
    </li>
    <li><label><input type="checkbox"><span>Page has specific requirements for this assignment (make a checklist from that assignment and make sure you've covered everything there). If there is a conflict between what you see here and in the instructions, ask on the class forums about it.</span></label></li>
  </ol>
</body>
</html>
